# Racing Wheel Suite — kernel HID quirks
#
# Some wheelbases require HID_QUIRK_ALWAYS_POLL (0x0400) on Linux.
# Without continuous polling, the device will repeatedly disconnect
# and reconnect ("infinite reboot" loop), making it unusable.
#
# Affected devices:
#   - Asetek SimSports: Forte, Invicta, La Prima, Tony Kanaan Edition
#   - Simagic EVO:      EVO Sport, EVO, EVO Pro
#
# Source: JacKeTUs/linux-steering-wheels compatibility table
#   Asetek: footnote [^13]
#   Simagic GT Neo / EVO: "Device is infinitely rebooting" section
#
# Install:
#   sudo cp packaging/linux/90-racing-wheel-quirks.conf /etc/modprobe.d/
#   sudo update-initramfs -u        # Debian/Ubuntu
#   sudo dracut --force             # Fedora/RHEL
#
# The usbhid module must be reloaded (or the system rebooted) after installation.
# The install.sh script installs this file automatically.

options usbhid quirks=0x2433:0xF300:0x0400,0x2433:0xF301:0x0400,0x2433:0xF303:0x0400,0x2433:0xF306:0x0400,0x3670:0x0500:0x0400,0x3670:0x0501:0x0400,0x3670:0x0502:0x0400
