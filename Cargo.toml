exclude = ["third_party/shared_memory", "fuzz"]
resolver = "2"

[workspace.package]
version = "0.1.0"
edition = "2024"
rust-version = "1.93"
license = "MIT OR Apache-2.0"
authors = ["Racing Wheel Suite Contributors"]
repository = "https://github.com/EffortlessMetrics/OpenRacing"

[workspace.lints.rust]
unsafe_code = "forbid"
unsafe_op_in_unsafe_fn = "deny"
unused_must_use = "deny"
unexpected_cfgs = "warn"
const_item_interior_mutations = "deny"
function_casts_as_integer = "deny"

[workspace.lints.clippy]
# Panic-free production and tests
dbg_macro = "deny"
todo = "deny"
unimplemented = "deny"
panic = "deny"
unreachable = "deny"
unwrap_used = "deny"
expect_used = "deny"
get_unwrap = "deny"
unwrap_in_result = "deny"
panic_in_result_fn = "deny"
string_slice = "deny"
indexing_slicing = "deny"
out_of_bounds_indexing = "deny"
unchecked_time_subtraction = "deny"

# AST / parser / UTF-8 / slice safety
char_indices_as_byte_indices = "deny"
sliced_string_as_bytes = "deny"
index_refutable_slice = "deny"

# Silent failure
let_underscore_future = "deny"
let_underscore_must_use = "deny"
let_underscore_lock = "deny"
unused_result_ok = "deny"
map_err_ignore = "deny"
assertions_on_result_states = "deny"
lines_filter_map_ok = "deny"

# Async / concurrency
await_holding_lock = "deny"
await_holding_refcell_ref = "deny"
await_holding_invalid_type = "deny"
future_not_send = "warn"
large_futures = "warn"
arc_with_non_send_sync = "deny"
rc_mutex = "deny"
mut_mutex_lock = "deny"
readonly_write_lock = "deny"

# Unsafe / memory
mem_forget = "deny"
forget_non_drop = "deny"
drop_non_drop = "deny"
undocumented_unsafe_blocks = "deny"
multiple_unsafe_ops_per_block = "deny"
repr_packed_without_abi = "deny"

# Numeric correctness
float_cmp = "deny"
float_cmp_const = "deny"
float_equality_without_abs = "deny"
lossy_float_literal = "deny"
cast_sign_loss = "deny"
cast_possible_wrap = "warn"
cast_possible_truncation = "warn"
cast_precision_loss = "warn"
invalid_upcast_comparisons = "deny"
cast_abs_to_unsigned = "deny"
cast_enum_truncation = "deny"
cast_nan_to_int = "deny"
manual_midpoint = "warn"
manual_is_multiple_of = "warn"
manual_div_ceil = "warn"
arithmetic_side_effects = "warn"

# File/process/path footguns
suspicious_open_options = "deny"
nonsensical_open_options = "deny"
ineffective_open_options = "deny"
path_buf_push_overwrite = "deny"
join_absolute_paths = "deny"
read_line_without_trim = "warn"
exit = "deny"

# API / trait correctness
iter_not_returning_iterator = "deny"
expl_impl_clone_on_copy = "deny"
infallible_try_from = "deny"
fallible_impl_from = "deny"
error_impl_error = "deny"
result_unit_err = "warn"
result_large_err = "warn"

# Good taste that pays rent
format_in_format_args = "deny"
to_string_in_format_args = "deny"
unused_format_specs = "deny"
unnecessary_debug_formatting = "warn"
uninlined_format_args = "warn"
manual_let_else = "warn"
manual_ok_or = "warn"
manual_strip = "warn"
manual_split_once = "warn"
manual_is_variant_and = "warn"
filter_map_next = "warn"
flat_map_option = "warn"
match_result_ok = "deny"
cloned_instead_of_copied = "warn"
iter_cloned_collect = "warn"
iter_overeager_cloned = "warn"
needless_collect = "warn"
redundant_closure = "warn"
redundant_closure_for_method_calls = "warn"
missing_panics_doc = "deny"
missing_errors_doc = "warn"

# Suppression governance
allow_attributes = "deny"
allow_attributes_without_reason = "deny"
blanket_clippy_restriction_lints = "deny"
ignore_without_reason = "deny"
should_panic_without_expect = "deny"

[workspace.dependencies]
# Critical async/serialization crates - pinned for compatibility
tokio = { version = "1.49.0", features = ["full"] }
tonic = "0.14.3"
tonic-prost = "0.14.3"
prost = "0.14.3"
prost-types = "0.14.3"
async-trait = "0.1.89"

# Core dependencies
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.149"
serde_yaml = { package = "serde_yaml_ng", version = "0.10.0" }
quick-xml = "0.37.5"
bincode = { package = "cu-bincode", version = "2.0.2", features = ["serde"] }
anyhow = "1.0.100"
thiserror = "2.0.18"
tracing = "0.1.44"
tracing-subscriber = "0.3.22"

# Real-time and performance
parking_lot = "0.12.5"
crossbeam = "0.8.4"
mimalloc = "0.1.48"

# Workspace-local microcrates
openracing-atomic = { path = "crates/openracing-atomic" }
openracing-tracing = { path = "crates/openracing-tracing" }
openracing-scheduler = { path = "crates/openracing-scheduler" }
openracing-curves = { path = "crates/openracing-curves" }
openracing-errors = { path = "crates/openracing-errors" }
openracing-filters = { path = "crates/openracing-filters" }
openracing-pipeline = { path = "crates/openracing-pipeline" }
openracing-crypto = { path = "crates/openracing-crypto" }
openracing-plugin-abi = { path = "crates/openracing-plugin-abi" }
openracing-native-plugin = { path = "crates/openracing-native-plugin" }
openracing-wasm-runtime = { path = "crates/openracing-wasm-runtime" }
openracing-test-helpers = { path = "crates/openracing-test-helpers" }
openracing-fmea = { path = "crates/openracing-fmea" }
openracing-watchdog = { path = "crates/openracing-watchdog" }
openracing-hardware-watchdog = { path = "crates/openracing-hardware-watchdog" }
openracing-profile-repository = { path = "crates/openracing-profile-repository" }
openracing-firmware-update = { path = "crates/openracing-firmware-update" }
openracing-ipc = { path = "crates/openracing-ipc" }
openracing-diagnostic = { path = "crates/openracing-diagnostic" }
openracing-device-types = { path = "crates/openracing-device-types" }
openracing-hid-common = { path = "crates/openracing-hid-common" }
openracing-shifter = { path = "crates/openracing-shifter" }
openracing-handbrake = { path = "crates/openracing-handbrake" }
openracing-ffb = { path = "crates/openracing-ffb" }
openracing-pidff-common = { path = "crates/pidff-common" }
openracing-calibration = { path = "crates/openracing-calibration" }

# System / platform
libc = "0.2.182"

# HID and hardware
hidapi = "2.6.4"
libudev = "0.3.0"
crc32fast = "1.5.0"

# Schema and validation
jsonschema = "0.40.2"

# Testing
criterion = "0.8.2"
proptest = "1.9.0"
quickcheck = "1.0.3"
quickcheck_macros = "1.1.0"
hdrhistogram = "7.5.4"
insta = "1.46.3"
mockall = "0.14.0"
tokio-test = "0.4.5"
wiremock = "0.6.5"
statistical = "1.0.0"
uuid = { version = "1.21.0", features = ["v4"] }
