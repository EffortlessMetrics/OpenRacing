# Clippy configuration for OpenRacing.
#
# Lint levels live in the workspace Cargo.toml and are mirrored in
# policy/clippy-lints.toml. This file is reserved for repo-specific Clippy
# configuration knobs and disallowed-method/type/macro policy; do not add test
# carveouts such as allow-unwrap-in-tests or allow-panic-in-tests.

# Avoid false positives for large error types in Result.
type-complexity-threshold = 250

# Allow descriptive RT functions and builder-style APIs to remain readable.
too-many-arguments-threshold = 8

# Allow more complex functions for reviewed RT-critical state machines.
cognitive-complexity-threshold = 30

# Increase enum variant name threshold for detailed error types.
enum-variant-name-threshold = 4

# Allow longer variable names for clarity in RT code.
single-char-binding-names-threshold = 5

# Increase literal representation threshold.
literal-representation-threshold = 10

# Allow more lines in configuration and protocol tables before style warnings.
too-many-lines-threshold = 150

# Increase trivial-copy pass-by-value threshold for small RT data types.
trivial-copy-size-limit = 128
