name: YAML Sync Check

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  yaml-sync:
    name: Game support matrix sync
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install PyYAML
        run: pip install pyyaml

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev pkg-config

      - name: Check game support matrix files are identical
        run: |
          cargo run -p wheelctl --bin yaml-sync-check --locked -- \
            crates/telemetry-config/src/game_support_matrix.yaml \
            crates/telemetry-support/src/game_support_matrix.yaml
